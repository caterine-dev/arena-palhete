{% extends "base.html" %}
{% block title %}Novo Cliente — Arena Palhete{% endblock %}

{% block header %}
<header class="bg-white flex items-center w-full px-4 py-4 fixed top-0 z-50 border-b border-zinc-200 gap-4">
    <a href="javascript:history.back()" class="text-primary p-2 hover:bg-zinc-100 rounded-lg transition-colors">
        <span class="material-symbols-outlined">arrow_back</span>
    </a>
    <h1 class="font-['Lexend'] text-lg font-bold text-primary-container">Novo Cliente</h1>
</header>
{% endblock %}

{% block content %}
<div class="py-4 max-w-lg mx-auto">
    <form method="POST" class="flex flex-col gap-5">
        <div class="bg-white rounded-xl p-5 shadow-sm border border-zinc-200 flex flex-col gap-4">
            <div class="flex flex-col gap-1">
                <label class="font-['Lexend'] text-xs font-semibold text-on-surface uppercase tracking-widest">Nome completo</label>
                <input type="text" name="nome" required autofocus
                       class="w-full border border-zinc-200 rounded-lg px-3 py-3 font-['Lexend'] text-sm focus:outline-none focus:border-primary-container transition-colors"
                       placeholder="Nome do cliente ou do time"/>
            </div>
            <div class="flex flex-col gap-1">
                <label class="font-['Lexend'] text-xs font-semibold text-on-surface uppercase tracking-widest">Telefone / WhatsApp</label>
                <input type="tel" name="telefone" required
                       class="w-full border border-zinc-200 rounded-lg px-3 py-3 font-['Lexend'] text-sm focus:outline-none focus:border-primary-container transition-colors"
                       placeholder="(22) 99999-9999"/>
            </div>
        </div>
        <button type="submit"
                class="w-full bg-primary-container text-white py-4 rounded-xl font-['Lexend'] font-semibold text-base flex items-center justify-center gap-2 hover:bg-primary transition-colors">
            <span class="material-symbols-outlined">person_add</span>
            Cadastrar Cliente
        </button>
    </form>
</div>
{% endblock %}
