{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Novo Contrato de Mensalista</h4>
        </div>
        <div class="card-body">
            <form method="POST" action="{{ url_for('mensalistas.novo') }}">
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="cliente_id" class="form-label">Cliente Responsável</label>
                        <select class="form-select" id="cliente_id" name="cliente_id" required>
                            <option value="">Selecione um cliente...</option>
                            {% for c in clientes %}
                                <option value="{{ c.id }}">{{ c.nome }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="col-md-6">
                        <label for="plano_id" class="form-label">Plano de Locação</label>
                        <select class="form-select" id="plano_id" name="plano_id" required>
                            <option value="">Selecione um plano...</option>
                            {% for p in planos %}
                                <option value="{{ p.id }}">{{ p.nome }} ({{ p.duracao_minutos }} min) - R$ {{ "%.2f"|format(p.valor_mensal) }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-3">
                        <label for="dia_semana" class="form-label">Dia Fixo</label>
                        <select class="form-select" id="dia_semana" name="dia_semana" required>
                            <option value="">Escolha o dia...</option>
                            <option value="0">Segunda-feira</option>
                            <option value="1">Terça-feira</option>
                            <option value="2">Quarta-feira</option>
                            <option value="3">Quinta-feira</option>
                            <option value="4">Sexta-feira</option>
                            <option value="5">Sábado</option>
                            <option value="6">Domingo</option>
                        </select>
                    </div>

                    <div class="col-md-3">
                        <label for="hora_inicio" class="form-label">Horário Início</label>
                        <input type="time" class="form-control" id="hora_inicio" name="hora_inicio" required>
                        <div class="form-text text-success" style="font-size: 0.75rem;">
                            <i class="bi bi-info-circle"></i> O término é calculado pelo plano.
                        </div>
                    </div>

                    <div class="col-md-3">
                        <label for="data_inicio" class="form-label">Data Início</label>
                        <input type="date" class="form-control" id="data_inicio" name="data_inicio" required>
                    </div>

                    <div class="col-md-3">
                        <label for="data_fim" class="form-label">Data Fim (Último dia)</label>
                        <input type="date" class="form-control" id="data_fim" name="data_fim" required>
                    </div>
                </div>

                <div class="d-flex justify-content-end mt-4">
                    <a href="{{ url_for('mensalistas.index') }}" class="btn btn-secondary me-2">Cancelar</a>
                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-check-lg"></i> Salvar Mensalista
                    </button>
                </div>

            </form>
        </div>
    </div>
</div>
{% endblock %}
