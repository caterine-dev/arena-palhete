<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Arena Palhete — Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Lexend', sans-serif; min-height: 100dvh; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="bg-gradient-to-br from-[#2D2D2D] to-[#8b0000] flex flex-col items-center justify-center p-6 min-h-screen">
    <main class="w-full max-w-[400px] flex flex-col items-center gap-10">
        <header class="flex flex-col items-center gap-3 text-white">
            <span class="material-symbols-outlined text-[52px]">sports_soccer</span>
            <h1 class="text-5xl font-black tracking-widest uppercase leading-none text-center">Arena<br/>Palhete</h1>
        </header>

        <section class="w-full bg-white rounded-xl p-6 shadow-[0_10px_40px_rgba(0,0,0,0.3)]">
            <h2 class="text-2xl font-semibold text-[#1a1c1c] mb-6">Acesso Restrito</h2>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for category, message in messages %}
                <div class="mb-4 px-4 py-3 rounded-lg text-sm font-medium
                    {% if category == 'error' %}bg-red-50 text-red-800 border border-red-200{% else %}bg-green-50 text-green-800{% endif %}">
                    {{ message }}
                </div>
                {% endfor %}
            {% endwith %}

            <form method="POST" class="flex flex-col gap-5">
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-semibold tracking-widest text-[#1a1c1c] uppercase" for="email">E-mail ou Usuário</label>
                    <input class="w-full bg-white border border-[#e2e2e2] rounded px-3 py-3 text-base text-[#1a1c1c] focus:outline-none focus:border-[#8b0000] transition-colors"
                           id="email" name="email" placeholder="Seu acesso" type="text" required autocomplete="email"/>
                </div>
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-semibold tracking-widest text-[#1a1c1c] uppercase" for="senha">Senha</label>
                    <input class="w-full bg-white border border-[#e2e2e2] rounded px-3 py-3 text-base text-[#1a1c1c] focus:outline-none focus:border-[#8b0000] transition-colors"
                           id="senha" name="senha" placeholder="••••••••" type="password" required/>
                </div>
                <div class="flex items-center gap-2 mt-1">
                    <input class="w-4 h-4 rounded border-[#e2e2e2] text-[#8b0000] focus:ring-[#8b0000]"
                           type="checkbox" id="lembrar" name="lembrar"/>
                    <label class="text-sm text-[#5a403c]" for="lembrar">Lembrar-me</label>
                </div>
                <button class="w-full bg-[#8b0000] text-white text-xl font-semibold py-3 rounded hover:bg-[#610000] transition-colors active:scale-[0.98] mt-1"
                        type="submit">Entrar</button>
            </form>
        </section>

        <footer>
            <p class="text-sm text-white/60">Acesso apenas por convite.</p>
        </footer>
    </main>
</body>
</html>
